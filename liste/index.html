<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <script src="/js/theme-head.js"></script>
  <script src="/js/i18n/de.js"></script>
  <script src="/js/i18n/en.js"></script>
  <script src="/js/i18n/fr.js"></script>
  <script src="/js/i18n/it.js"></script>
  <script src="/js/i18n/es.js"></script>
  <script src="/js/i18n/events/de.js"></script>
  <script src="/js/i18n/events/en.js"></script>
  <script src="/js/i18n/events/fr.js"></script>
  <script src="/js/i18n/events/it.js"></script>
  <script src="/js/i18n/events/es.js"></script>
  <script src="/js/i18n/core.js"></script>
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" id="meta-theme-color" content="#ffffff" />
  <meta
    id="list-description-meta"
    name="description"
    content="Ereignisse der vier Evangelien suchen, parallel lesen, merken und als Link teilen."
  />
  <meta property="og:locale" content="de_CH" />
  <meta property="og:site_name" content="Synopse der vier Evangelien" />
  <meta property="og:type" content="website" />
  <meta id="list-og-title" property="og:title" content="Ereignis suchen · Synopse der vier Evangelien" />
  <meta
    id="list-og-description"
    property="og:description"
    content="Ereignisse der vier Evangelien suchen, parallel lesen, merken und als Link teilen."
  />
  <meta property="og:url" content="https://synopse.ch/liste/" />
  <meta property="og:image" content="https://synopse.ch/og-default.svg" />
  <meta property="og:image:type" content="image/svg+xml" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Synopse der vier Evangelien mit stilisierten farbigen Evangelienlinien." />
  <script src="/js/plausible-init.js"></script>
  <title id="list-title-meta">Ereignis suchen · Synopse der vier Evangelien</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/synopse.css" />
</head>
<body class="liste-page">
  <div class="wrap liste-page-wrap">
    <header class="compare-home-header compare-home-header--landing liste-page__header">
      <a href="/" class="liste-nav-back" id="list-back-home">← Startseite</a>
      <h1 class="compare-home-header__mark" id="list-page-title">Ereignis suchen</h1>
      <div class="compare-home-header__right">
        <details class="lang-switch">
          <summary class="lang-switch__trigger" aria-label="Language" title="Language">
            <svg class="lang-switch__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M3 12h18"></path>
              <path d="M12 3a14 14 0 0 1 0 18"></path>
              <path d="M12 3a14 14 0 0 0 0 18"></path>
            </svg>
          </summary>
          <div class="lang-switch__menu" role="group" aria-label="Language">
            <button type="button" class="lang-switch__btn" data-lang-switch="de">DE</button>
            <button type="button" class="lang-switch__btn" data-lang-switch="en">EN</button>
            <button type="button" class="lang-switch__btn" data-lang-switch="fr">FR</button>
            <button type="button" class="lang-switch__btn" data-lang-switch="it">IT</button>
            <button type="button" class="lang-switch__btn" data-lang-switch="es">ES</button>
          </div>
        </details>
        <div class="compare-home-theme">
          <span class="theme-switch-label" id="theme-mode-label">Dark-Mode</span>
          <button
            type="button"
            class="theme-switch"
            role="switch"
            aria-checked="false"
            data-theme-toggle
            aria-labelledby="theme-mode-label"
          >
            <span class="theme-switch__thumb" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </header>

    <section class="liste-page__search" id="liste-search-section" aria-label="Suche und Filter">
      <div class="liste-page__search-row">
        <div class="liste-page__search-col">
          <div class="filter-toolbar" id="filter-accordion">
            <div class="filter-toolbar-search">
              <input
                type="search"
                id="q"
                aria-label="Suche nach Ereignis oder Bibelstelle"
                placeholder="Suche nach Ereignis oder Bibelstelle (z. B. „Gelähmte“ oder „Markus 2“)"
                data-placeholder-desktop="Suche nach Ereignis oder Bibelstelle (z. B. „Gelähmte“ oder „Markus 2“)"
                data-placeholder-mobile="Ereignis oder Bibelstelle"
                autocomplete="off"
              />
              <div class="search-assist" id="search-assist" hidden></div>
            </div>
            <details class="filter-acc-panel" name="filter-acc" data-filter-kind="presets">
              <summary
                id="filter-presets-summary"
                class="filter-acc-summary filter-acc-summary--toolbar"
                title="Filter nach Evangelien öffnen oder schliessen"
              >
                <svg class="filter-acc-btn-icon" viewBox="0 0 120 120" width="40" height="40" aria-hidden="true" focusable="false">
                  <line class="filter-line" x1="10" y1="25" x2="110" y2="25" />
                  <line class="filter-line" x1="10" y1="60" x2="110" y2="60" />
                  <line class="filter-line" x1="10" y1="95" x2="110" y2="95" />
                  <circle class="filter-knob filter-k1" cx="38" cy="25" r="10" />
                  <circle class="filter-knob filter-k2" cx="78" cy="60" r="10" />
                  <circle class="filter-knob filter-k3" cx="52" cy="95" r="10" />
                </svg>
              </summary>
              <div class="filter-acc-body filter-acc-body--presets">
                <div class="preset-wrap" id="presets"></div>
              </div>
            </details>
          </div>
        </div>
      </div>
    </section>

    <section class="event-explorer event-explorer--inline" id="event-explorer" aria-label="Kapitel-Navigation">
      <div class="event-explorer__chapters" id="event-explorer-chapters"></div>
    </section>

    <div
      class="chapter-picker"
      id="chapter-picker"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="chapter-picker-title"
    >
      <div class="chapter-picker__backdrop" id="chapter-picker-backdrop" aria-hidden="true"></div>
      <section class="chapter-picker__panel">
        <button type="button" class="chapter-picker__close" id="chapter-picker-close" aria-label="Schliessen">
          ×
        </button>
        <h2 class="chapter-picker__title" id="chapter-picker-title"></h2>
        <div class="chapter-picker__items" id="chapter-picker-items"></div>
      </section>
    </div>

    <section class="list-section" id="list-section" aria-label="Ereignisliste">
      <div class="section-list-heading" id="section-list-heading" hidden>
        <h2 class="section-list-heading__title" id="section-list-heading-title"></h2>
        <a href="/liste/" class="section-list-heading__all" id="section-list-heading-clear" hidden>Zurücksetzen</a>
      </div>
      <div class="count" id="count"></div>
      <div class="list" id="list"></div>
    </section>

    <footer class="liste-page__footer">
      <p>
        <a href="/" id="list-footer-home-link">Zur Startseite</a>
        ·
        <a href="/sources/" id="list-footer-sources-link">Quellen &amp; Lizenzen</a>
      </p>
      <p id="list-footer-text">
        Die Darstellung basiert auf einer eigenen Zusammenstellung in Anlehnung an die <strong>Synopsis Quattuor Evangeliorum</strong> von Kurt Aland.
      </p>
    </footer>
  </div>

  <div class="fab-stack">
    <button type="button" class="scroll-top-fab" id="scroll-top-fab" aria-label="Nach oben scrollen" title="Nach oben">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <path d="M18 15l-6-6-6 6" />
      </svg>
    </button>
  </div>

  <div class="share-feedback" id="share-feedback" hidden role="status" aria-live="polite"></div>

  <div
    class="compare-modal"
    id="compare-modal"
    hidden
    role="dialog"
    aria-modal="true"
    aria-labelledby="compare-modal-title"
  >
    <div class="compare-modal-backdrop" id="compare-modal-backdrop" aria-hidden="true"></div>
    <div class="compare-modal-shell">
      <section class="compare-translations-bar translation-toolbar-wrap" id="compare-translations-bar" aria-label="Lesetexte">
        <div class="translation-toolbar">
          <div class="translation-toolbar__pickers compare-modal-translations-box compare-translations-box--wide">
            <div class="translation-buttons translation-buttons--lang-strip" id="compare-modal-translation-buttons"></div>
          </div>
        </div>
      </section>
      <div class="compare-modal-panel" id="compare-modal-panel">
        <div class="compare-modal-actions" id="compare-modal-actions" aria-label="Aktionen">
          <button
            type="button"
            class="compare-marker-toggle"
            id="compare-modal-marker-toggle"
            aria-label="Marker umschalten"
            aria-pressed="true"
            title="Marker ausblenden"
          >
            <span class="compare-marker-toggle__icon" aria-hidden="true">
              <svg class="compare-marker-toggle__svg" viewBox="0 0 24 24" focusable="false">
                <path d="M4 15.5 14.5 5a2.12 2.12 0 1 1 3 3L7 18.5H4z"></path>
                <path d="M13 6.5 17.5 11"></path>
                <path d="M3 21h9"></path>
              </svg>
            </span>
          </button>
          <button
            type="button"
            class="compare-modal-favorite"
            id="compare-modal-favorite"
            aria-label="Zu Favoriten hinzufügen"
            aria-pressed="false"
            title="Zu Favoriten hinzufügen"
            hidden
          >
            <span class="compare-modal-favorite__icon" aria-hidden="true">
              <svg class="compare-modal-favorite__svg" viewBox="0 0 24 24" focusable="false">
                <path d="M6 4.75A1.75 1.75 0 0 1 7.75 3h8.5A1.75 1.75 0 0 1 18 4.75V21l-6-3.45L6 21V4.75Z"></path>
              </svg>
            </span>
            <span class="compare-modal-favorite__label" aria-hidden="true">Merken</span>
          </button>
          <button
            type="button"
            class="compare-modal-share"
            id="compare-modal-share"
            aria-label="Ereignis teilen"
            title="Ereignis teilen"
            hidden
          >
            <span class="compare-modal-share__icon" aria-hidden="true">
              <svg class="compare-modal-share__svg" viewBox="0 0 24 24" focusable="false">
                <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7a2.4 2.4 0 0 0 0-1.39l7.02-4.11A2.99 2.99 0 1 0 15 5a3 3 0 0 0 .04.49L8.02 9.6a3 3 0 1 0 0 4.8l7.02 4.12A2.82 2.82 0 0 0 15 19a3 3 0 1 0 3-2.92Z"></path>
              </svg>
            </span>
          </button>
          <button type="button" class="compare-modal-close" id="compare-modal-close" aria-label="Schliessen">
            ×
          </button>
        </div>
        <header class="compare-modal-header">
          <p class="compare-modal-aland" id="compare-modal-aland"></p>
          <h2 id="compare-modal-title"></h2>
          <p class="compare-modal-sec" id="compare-modal-sec"></p>
        </header>
        <div class="text-grid compare-modal-grid" id="compare-modal-grid" data-filled="0"></div>
      </div>
    </div>
  </div>

  <div
    id="translation-picker-overlay"
    class="translation-picker-overlay"
    hidden
    role="dialog"
    aria-modal="true"
    aria-labelledby="translation-picker-title"
  >
    <div class="translation-picker-toolbar">
      <h2 id="translation-picker-title" class="translation-picker-title">Alle Lesetexte</h2>
      <button type="button" class="translation-picker-close" id="translation-picker-close" aria-label="Schliessen">
        ×
      </button>
    </div>
    <div class="translation-picker-scroll">
      <div class="translation-buttons translation-picker-inner" id="translation-picker-body"></div>
    </div>
  </div>

  <dialog id="translation-info-dialog" class="translation-info-dialog" aria-labelledby="translation-info-dialog-title">
    <div class="translation-info-dialog-inner">
      <button type="button" class="translation-info-dialog-x" id="translation-info-dialog-close" aria-label="Hinweis schliessen">
        ×
      </button>
      <h4 id="translation-info-dialog-title" class="translation-info-dialog-h"></h4>
      <p id="translation-info-dialog-body" class="translation-info-dialog-body"></p>
    </div>
  </dialog>

  <script src="/js/theme.js" defer></script>
  <script src="/data/parallels_data.js"></script>
  <script src="/js/compare_text.js"></script>
  <script src="/js/synopse.config.js"></script>
  <script src="/js/synopse.search.js"></script>
  <script src="/js/synopse.share.js"></script>
  <script src="/js/synopse.translations.js"></script>
  <script src="/js/synopse.js"></script>
</body>
</html>
